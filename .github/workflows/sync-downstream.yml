name: Sync to Downstream Repos

on:
  push:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.github/workflows/daily-ingest.yml'
      - '.github/workflows/deploy-pages.yml'
      - '.github/workflows/validate-docs.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        repo:
          - agri-intel
          - auto-intel
          - battery-intel
          - cement-intel
          - defense-intel
          - display-intel
          - food-intel
          - glass-intel
          - housing-intel
          - hydrogen-intel
          - machinery-intel
          - memory-intel
          - mineral-intel
          - petpack-intel
          - pharma-intel
          - recycle-intel
          - shipping-intel
          - solar-intel
          - space-intel
          - steel-intel
          - telecom-intel
          - textile-intel
          - water-intel

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: weiqi-kids
          repositories: ${{ matrix.repo }}

      - name: Checkout template repo
        uses: actions/checkout@v4
        with:
          path: template

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: weiqi-kids/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target

      - name: Compute sync branch name
        id: branch
        run: echo "name=sync/templates-$(cd template && git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Sync files
        run: |
          # Sync skills
          mkdir -p target/.claude/skills
          cp template/.claude/skills/*.md target/.claude/skills/ 2>/dev/null || true

          # Sync workflows (exclude sync-downstream.yml itself)
          for f in daily-ingest.yml deploy-pages.yml validate-docs.yml; do
            if [ -f "template/.github/workflows/$f" ]; then
              cp "template/.github/workflows/$f" "target/.github/workflows/$f"
            fi
          done

      - name: Check for changes
        id: diff
        working-directory: target
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        working-directory: target
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          git config user.name "Template Sync Bot"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: sync skills + workflows from intel-template"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: sync skills + workflows from templates" \
            --body "Auto-generated by intel-template sync workflow.

Synced from commit: ${{ github.sha }}

Files synced:
- \`.claude/skills/*.md\`
- \`.github/workflows/daily-ingest.yml\`
- \`.github/workflows/deploy-pages.yml\`
- \`.github/workflows/validate-docs.yml\`" \
            --base main \
            --head "$BRANCH"
